name: CI (Ruff lint + pytest + coverage) - backend:   runs-on: ubuntu-latest  defaults: { run: working-directory: backend   steps:   - uses: actions/checkout@v4   - name: Set up Python     uses: actions/setup-python@v5     with: python-version: "        
  ,        "\n      - name: Install dependencies     run: |     pip install -r requirements.txt     pip install ruff pytest pytest-cov pytest-asyncio httpx   - name: Lint (ruff)     run: ruff check .   - name: Test     run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing     env:       ZAI_API_KEY: test-key       JWT_SECRET: test-secret   - name: Upload coverage     uses: actions/upload-artifact@v4     with:       name: coverage-report       path: backend/coverage.xml  frontend:   runs-on: ubuntu-latest  defaults: { run: working-directory: frontend   steps:   - uses: actions/checkout@v4   - name: Check HTML     run: |       for f in *.html admin/*.html; do         if [ -f \"$f\" ]; then           echo \"â $f exists\"         fi       done   - name: Check CSS     run: |       if [ -f css/style.css ]; then         echo \"CSS OK\"       else         echo \"Missing CSS\"         exit 1       fi   - name: Check JS     run: |       for f in js/*.js; do         if [ -f \"$f\" ]; then           echo \"$f\"         fi      done