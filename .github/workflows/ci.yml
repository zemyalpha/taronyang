name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npx eslint src/ --ext .ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML
        run: |
          for f in *.html admin/*.html; do
            if [ -f "$f" ]; then
              echo "✅ $f exists"
            fi
          done

      - name: Check CSS
        run: |
          if [ -f css/style.css ]; then
            echo "✅ CSS OK"
          else
            echo "❌ Missing CSS"
            exit 1
          fi

      - name: Check JS
        run: |
          for f in js/*.js; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            fi
          done
