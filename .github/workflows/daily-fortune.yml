name: Daily Fortune Auto-Publish

on:
  schedule:
    # KST 00:00 (midnight) = UTC 15:00 — generate the day's fortune at the
    # start of the KST day so it is live before any user visits.
    - cron: '0 15 * * *'
    # Safety-net run at KST 07:00 in case the midnight run was delayed/skipped
    # (GitHub Actions scheduled workflows can be delayed during peak load).
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to today KST.'
        required: false
        type: string
      days:
        description: 'Number of days to generate (backfill). Default: 1'
        required: false
        type: string
        default: '1'
      ahead:
        description: 'Pre-generate N days into the future (forward-fill buffer). Default: 3'
        required: false
        type: string
        default: '3'

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: daily-fortune
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily fortune
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="${{ inputs.date }}"; fi
          if [ -n "${{ inputs.days }}" ]; then ARGS="$ARGS --days ${{ inputs.days }}"; fi
          if [ -n "${{ inputs.ahead }}" ]; then ARGS="$ARGS --ahead ${{ inputs.ahead }}"; fi
          # For scheduled (cron) runs, inputs.* are empty — default to
          # backfill 1 + forward-fill 3 days so a missed cron never causes 404s.
          if [ -z "$ARGS" ]; then ARGS="--days 1 --ahead 3"; fi
          echo "Running: node scripts/generate-daily-fortune.mjs $ARGS"
          node scripts/generate-daily-fortune.mjs $ARGS

      - name: Publish via PR (respects main branch protection)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/blog/daily/ frontend/sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit — fortune already up to date."
          else
            COMMIT_DATE=$(date -u +%Y-%m-%d)
            BRANCH="daily/auto-${COMMIT_DATE}"
            # Clean up any stale branch/PR from a partial earlier run today
            # (e.g. the workflow ran, created a branch, but failed to merge).
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "ℹ️ Existing branch $BRANCH found — cleaning up before re-creating."
              EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
              if [ -n "$EXISTING_PR" ]; then
                gh pr close "$EXISTING_PR" --delete-branch || true
              else
                git push origin --delete "$BRANCH" || true
              fi
            fi
            # Commit on a throwaway branch instead of pushing to protected main
            git checkout -b "$BRANCH"
            git commit -m "feat(daily-fortune): auto-publish daily fortune for ${COMMIT_DATE}

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push --set-upstream origin "$BRANCH"
            # Create PR and merge immediately.
            #
            # --auto fails on bot-created PRs: GitHub Actions does not run CI
            # on PRs opened by GITHUB_TOKEN, so the PR is already "clean" and
            # GitHub rejects enablePullRequestAutoMerge with
            # "Pull request is in clean status". The fortune generator is
            # deterministic (no external deps), so an immediate squash-merge
            # is safe.
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "feat(daily-fortune): auto-publish daily fortune for ${COMMIT_DATE}" \
              --body "Automated daily fortune publish for ${COMMIT_DATE}.

          Generated by the Daily Fortune Auto-Publish workflow.

          Co-Authored-By: Paperclip <noreply@paperclip.ing>")
            echo "✅ Created PR: ${PR_URL}"
            gh pr merge "$BRANCH" --squash --delete-branch || {
              echo "::error::Merge failed for PR ${PR_URL}. Check main branch protection / required checks."
              echo "::error::PR ${PR_URL} is open — merge manually if needed."
              exit 1
            }
            echo "✅ PR merged immediately."
            # GITHUB_TOKEN push events do NOT trigger other workflows (GitHub design),
            # so we explicitly dispatch the deploy workflow. Without this, auto-published
            # fortunes land on main but never reach GitHub Pages. (ZEMA-2744)
            echo "Dispatching deploy-pages workflow..."
            gh workflow run deploy-pages.yml --ref main
            echo "✅ Deploy dispatched."
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily fortune generation failed. Check the workflow logs."
          echo "::notice::The daily fortune job failed. Manual intervention may be needed."
