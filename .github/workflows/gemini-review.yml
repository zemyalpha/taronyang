name: Gemini Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/gemini review')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = context.payload.issue.pull_request.url;
            const { data: pr } = await github.request(prUrl);
            const diffUrl = `${pr.url}/diff`;
            const { data: diff } = await github.request(diffUrl);
            core.setOutput('diff', diff.substring(0, 50000));
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_body', pr.body || '');

      - name: Gemini Review
        id: review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            const prTitle = `${{ steps.diff.outputs.pr_title }}`;
            const prBody = `${{ steps.diff.outputs.pr_body }}`;

            const prompt = `You are a senior code reviewer. Review the following pull request diff and provide actionable feedback.

            PR Title: ${prTitle}
            PR Description: ${prBody}

            Focus on:
            1. **Bugs & Logic Errors**: Potential crashes, null references, race conditions
            2. **Security Issues**: Injection, auth bypass, data leaks
            3. **Performance**: N+1 queries, memory leaks, unnecessary computations
            4. **Code Quality**: Naming, readability, DRY violations, dead code
            5. **TypeScript Best Practices**: Type safety, proper error handling

            Format your response in Korean with:
            - 🔴 Critical issues (must fix)
            - 🟡 Warnings (should fix)
            - 🟢 Suggestions (nice to have)

            If the code looks good, say "✅ 코드 리뷰 결과 이슈가 없습니다. 승인합니다."

            Diff:
            \`\`\`diff
            ${diff}
            \`\`\``;

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: {
                    temperature: 0.2,
                    maxOutputTokens: 4096
                  }
                })
              }
            );

            const data = await response.json();

            if (!data.candidates || !data.candidates[0]) {
              core.setFailed('Gemini API returned no response');
              return;
            }

            const review = data.candidates[0].content.parts[0].text;
            core.setOutput('review', review);

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            const prNumber = `${{ steps.diff.outputs.pr_number }}`;

            const body = `## 🤖 Gemini Code Review\n\n${review}\n\n---\n*Powered by [Gemini](https://ai.google.dev/)* | \`/gemini review\` to re-request`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
              body: body
            });

      - name: React to Trigger Comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });
